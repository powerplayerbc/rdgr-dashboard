<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>School | Carlton AI</title>

    <link rel="preconnect" href="https://yrwrswyjawmgtxrgbnim.supabase.co" crossorigin>
    <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin>
    <link rel="dns-prefetch" href="https://yrwrswyjawmgtxrgbnim.supabase.co">
    <script>
        // Instant auth check + theme application
        try {
            if (JSON.parse(localStorage.getItem('rdgr-session') || '{}').authenticated) {
                document.documentElement.classList.add('rdgr-authed');
            }
        } catch(e) {}
        try {
            var _p = JSON.parse(localStorage.getItem('rdgr-active-profile') || '{}');
            var _tc = JSON.parse(localStorage.getItem('deft-theme-' + (_p.id || 'default')) || '{}');
            var _presets = {
                forest:     { accent:'#A8D65B',accentWarm:'#F0A830',base:'#0F1008',surface:'#191C10',surfaceEl:'#232718',surfaceHi:'#2D3220',border:'#3A3F2C',success:'#6BCB77',warning:'#F0A830',danger:'#E85D5D',txt:'#EAE8E0',txt2:'#A09B8C',txt3:'#6B6758',headingFont:'Nunito',bodyFont:'DM Sans' },
                sunrise:    { accent:'#F0A830',accentWarm:'#E85D5D',base:'#100D08',surface:'#1C1810',surfaceEl:'#272118',surfaceHi:'#322B20',border:'#3F382C',success:'#6BCB77',warning:'#F0A830',danger:'#E85D5D',txt:'#EAE8E0',txt2:'#A09B8C',txt3:'#6B6758',headingFont:'Nunito',bodyFont:'DM Sans' },
                ocean:      { accent:'#38BDF8',accentWarm:'#06D6A0',base:'#080D10',surface:'#10161C',surfaceEl:'#182027',surfaceHi:'#202A32',border:'#2C363F',success:'#6BCB77',warning:'#F0A830',danger:'#E85D5D',txt:'#E0E8EA',txt2:'#8C9BA0',txt3:'#586B6B',headingFont:'Nunito',bodyFont:'DM Sans' },
                berry:      { accent:'#C084FC',accentWarm:'#FB7185',base:'#0D0810',surface:'#16101C',surfaceEl:'#201827',surfaceHi:'#2A2032',border:'#3A2C3F',success:'#6BCB77',warning:'#F0A830',danger:'#E85D5D',txt:'#E8E0EA',txt2:'#A08CA0',txt3:'#6B586B',headingFont:'Nunito',bodyFont:'DM Sans' },
                rdgr:       { accent:'#06D6A0',accentWarm:'#4CC9F0',base:'#08090D',surface:'#11131A',surfaceEl:'#1A1D28',surfaceHi:'#242836',border:'#2A2E3D',success:'#06D6A0',warning:'#FFD93D',danger:'#FF6B6B',txt:'#E8ECF1',txt2:'#8A95A9',txt3:'#525E73',headingFont:'Chakra Petch',bodyFont:'IBM Plex Sans' },
                monochrome: { accent:'#E8E8E8',accentWarm:'#A0A0A0',base:'#000000',surface:'#0A0A0A',surfaceEl:'#141414',surfaceHi:'#1E1E1E',border:'#2A2A2A',success:'#6BCB77',warning:'#F0A830',danger:'#E85D5D',txt:'#E8E8E8',txt2:'#A0A0A0',txt3:'#666666',headingFont:'Nunito',bodyFont:'DM Sans' },
            };
            var _t = (_tc.preset === 'custom' && _tc.custom) ? _tc.custom : (_presets[_tc.preset] || _presets.rdgr);
            if (_tc.statusOverrides) {
                if (_tc.statusOverrides.success) _t.success = _tc.statusOverrides.success;
                if (_tc.statusOverrides.warning) _t.warning = _tc.statusOverrides.warning;
                if (_tc.statusOverrides.danger) _t.danger = _tc.statusOverrides.danger;
            }
            var _r = document.documentElement;
            _r.style.setProperty('--deft-accent', _t.accent);
            _r.style.setProperty('--deft-accent-dim', _t.accent + '26');
            _r.style.setProperty('--deft-accent-warm', _t.accentWarm || _t.accent);
            _r.style.setProperty('--deft-base', _t.base);
            _r.style.setProperty('--deft-surface', _t.surface);
            _r.style.setProperty('--deft-surface-el', _t.surfaceEl || _t.surface);
            _r.style.setProperty('--deft-surface-hi', _t.surfaceHi || _t.surfaceEl || _t.surface);
            _r.style.setProperty('--deft-border', _t.border);
            _r.style.setProperty('--deft-success', _t.success || '#6BCB77');
            _r.style.setProperty('--deft-success-dim', (_t.success || '#6BCB77') + '26');
            _r.style.setProperty('--deft-warning', _t.warning || '#F0A830');
            _r.style.setProperty('--deft-warning-dim', (_t.warning || '#F0A830') + '26');
            _r.style.setProperty('--deft-danger', _t.danger || '#E85D5D');
            _r.style.setProperty('--deft-danger-dim', (_t.danger || '#E85D5D') + '26');
            _r.style.setProperty('--deft-txt', _t.txt);
            _r.style.setProperty('--deft-txt-2', _t.txt2 || '#8A95A9');
            _r.style.setProperty('--deft-txt-3', _t.txt3 || '#525E73');
            _r.style.setProperty('--deft-heading-font', _t.headingFont || 'Chakra Petch');
            _r.style.setProperty('--deft-body-font', _t.bodyFont || 'IBM Plex Sans');
            var _fs = _tc.fontScale || 1;
            _r.style.setProperty('--deft-font-scale', _fs);
        } catch(e) {}
    </script>
    <style>
        html.rdgr-authed .gate-overlay { display: none !important; }
        html.rdgr-authed #schoolApp { opacity: 1 !important; }
        body {
            background: var(--deft-base, #08090D) !important;
            color: var(--deft-txt, #E8ECF1) !important;
            font-family: var(--deft-body-font, 'IBM Plex Sans'), system-ui, sans-serif !important;
            margin: 0;
        }
        .font-heading, h1, h2, h3 {
            font-family: var(--deft-heading-font, 'Chakra Petch'), system-ui, sans-serif !important;
        }
        /* ── Bug Report FAB ── */
        .bug-report-fab {
            position: fixed; bottom: 1.5rem; left: 1.5rem; z-index: 190;
            width: 40px; height: 40px; border-radius: 50%;
            border: 1px solid var(--deft-border, #2A2E3D);
            background: var(--deft-surface-el, #1A1D28);
            color: var(--deft-txt-3, #525E73); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s, color 0.15s, box-shadow 0.15s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3); padding: 0; line-height: 1;
        }
        .bug-report-fab:hover {
            background: rgba(255,107,107,0.12); color: #FF6B6B;
            border-color: rgba(255,107,107,0.3); box-shadow: 0 4px 16px rgba(255,107,107,0.15);
        }
        .bug-report-fab .bug-badge {
            position: absolute; top: -4px; right: -4px;
            min-width: 16px; height: 16px; border-radius: 8px;
            background: #FF6B6B; color: #fff;
            font-size: 0.55rem; font-weight: 700;
            display: none; align-items: center; justify-content: center; padding: 0 3px;
        }
        .bug-report-modal { z-index: 195 !important; }
        .bug-report-modal .modal-content { max-width: 500px; width: 92vw; }
        .bug-form-label {
            display: block; font-size: 0.65rem; font-weight: 600;
            color: var(--deft-txt-2, #8A95A9); margin-bottom: 0.25rem;
            text-transform: uppercase; letter-spacing: 0.03em;
        }
        .bug-console-log {
            max-height: 100px; overflow-y: auto; padding: 0.4rem; border-radius: 0.375rem;
            background: rgba(0,0,0,0.3); border: 1px solid var(--deft-border, #2A2E3D);
            font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; line-height: 1.4;
        }
        .bug-ce { color: #FF6B6B; }
        .bug-cw { color: #FFD93D; }
        .bug-cn { color: var(--deft-txt-3, #525E73); font-style: italic; }
    </style>
    <link rel="stylesheet" href="school/css/school-core.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Nunito:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'deft-base': 'var(--deft-base)',
                        surface: 'var(--deft-surface)',
                        'surface-el': 'var(--deft-surface-el)',
                        'surface-hi': 'var(--deft-surface-hi)',
                        border: 'var(--deft-border)',
                        accent: 'var(--deft-accent)',
                        'accent-dim': 'var(--deft-accent-dim)',
                        success: 'var(--deft-success)',
                        warning: 'var(--deft-warning)',
                        danger: 'var(--deft-danger)',
                        txt: 'var(--deft-txt)',
                        'txt-2': 'var(--deft-txt-2)',
                        'txt-3': 'var(--deft-txt-3)',
                    },
                    fontFamily: {
                        heading: ['var(--deft-heading-font)', 'system-ui', 'sans-serif'],
                        body: ['var(--deft-body-font)', 'system-ui', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                }
            }
        }
    </script>
</head>
<body>

<!-- ═══════════════════════════════════════
     PASSWORD GATE
     ═══════════════════════════════════════ -->
<div id="gate" class="gate-overlay">
    <div class="max-w-sm w-full px-6">
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2 mb-4">
                <div class="w-2 h-2 rounded-full" style="background:var(--deft-accent);opacity:0.6;"></div>
                <span class="font-mono text-xs tracking-widest uppercase" style="color:var(--deft-accent);">School Dashboard</span>
            </div>
            <h1 class="font-heading text-3xl font-bold tracking-tight mb-2">RDGR School</h1>
            <p style="color:var(--deft-txt-2);" class="text-sm">Select your profile and enter the access code</p>
        </div>
        <div id="gateProfiles" class="flex justify-center gap-3 mb-6">
            <div class="text-center text-xs" style="color:var(--deft-txt-3);">Loading profiles...</div>
        </div>
        <form id="gateForm" onsubmit="return handleGate(event)">
            <input type="password" id="gateInput" class="gate-input" placeholder="Access code" autocomplete="off">
            <p id="gateError" class="gate-error">Incorrect code. Try again.</p>
            <button type="submit" class="btn btn-primary w-full py-3 mt-4" id="gateSubmitBtn" disabled style="opacity:0.4;">Select a profile first</button>
        </form>
    </div>
</div>

<!-- ═══════════════════════════════════════
     MAIN APPLICATION
     ═══════════════════════════════════════ -->
<div id="schoolApp" style="opacity: 0;">

    <!-- ── TOP NAV BAR ── -->
    <nav class="sticky top-0 z-50 border-b" style="border-color: var(--deft-border); background: rgba(8,9,13,0.92); backdrop-filter: blur(20px);">
        <div class="max-w-[1600px] mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 rounded-full" style="background:var(--deft-accent);animation:pulse 2s ease-in-out infinite;"></div>
                <a href="/" style="text-decoration:none;">
                    <h1 style="font-family: var(--deft-heading-font), system-ui, sans-serif; font-weight: 700; font-size: 1rem; letter-spacing: 0.025em; color: var(--deft-txt);">
                        RDGR <span style="color: var(--deft-txt-3); font-weight: 400;">School</span>
                    </h1>
                </a>
            </div>

            <!-- Profile Switcher -->
            <div id="profileSwitcher" class="relative">
                <button id="profileBtn" onclick="toggleProfileDropdown()" class="flex items-center gap-2 px-2 py-1 rounded-lg transition-colors" style="background:rgba(255,255,255,0.04);" aria-expanded="false" aria-haspopup="true">
                    <div id="profileAvatar" class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold" style="background:rgba(6,214,160,0.15);color:var(--deft-accent);">B</div>
                    <span id="profileName" class="text-sm hidden sm:inline" style="color:var(--deft-txt-2);">Bradford</span>
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2.5 4L5 6.5L7.5 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" style="color:var(--deft-txt-3);"/></svg>
                </button>
                <div id="profileDropdown" class="hidden absolute right-0 top-full mt-1 w-48 rounded-lg py-1 z-50" style="background:var(--deft-surface);border:1px solid var(--deft-border);box-shadow:0 8px 24px rgba(0,0,0,0.4);" role="menu"></div>
            </div>
        </div>
    </nav>

    <!-- ── CONTENT AREA ── -->
    <div class="max-w-[1200px] mx-auto px-4 sm:px-6 py-6">

        <!-- Tab Bar -->
        <div class="school-tabs mb-6">
            <button id="tab-lessons" class="school-tab active" onclick="switchView('lessons')" aria-selected="true">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="inline mr-1"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
                Today
            </button>
            <button id="tab-questions" class="school-tab" onclick="switchView('questions')" aria-selected="false">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="inline mr-1"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                Questions
            </button>
            <button id="tab-grades" class="school-tab" onclick="switchView('grades')" aria-selected="false">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="inline mr-1"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                Grades
            </button>
            <button id="tab-calendar" class="school-tab" onclick="switchView('calendar')" aria-selected="false">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="inline mr-1"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                Calendar
            </button>
            <button id="tab-typing" class="school-tab" onclick="switchView('typing')" aria-selected="false">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="inline mr-1"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M8 12h.01M12 12h.01M16 12h.01M7 16h10"/></svg>
                Typing
            </button>
            <button id="tab-teacher" class="school-tab" onclick="switchView('teacher')" aria-selected="false" data-role-min="admin">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="inline mr-1"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                Teacher
            </button>
        </div>

        <!-- ── VIEW CONTAINERS ── -->

        <!-- Today's Lessons -->
        <div id="view-lessons">
            <div id="lessons-header"></div>
            <div id="lessons-list" class="space-y-3 mt-4"></div>
        </div>

        <!-- Questions -->
        <div id="view-questions" style="display:none;">
            <div id="questions-header"></div>
            <div id="questions-progress" class="mt-3"></div>
            <div id="questions-lesson-content" class="mt-4"></div>
            <div id="questions-container" class="space-y-4 mt-4"></div>
        </div>

        <!-- Grades -->
        <div id="view-grades" style="display:none;">
            <div id="grades-stats" class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6"></div>
            <div id="grades-container"></div>
        </div>

        <!-- Calendar -->
        <div id="view-calendar" style="display:none;">
            <div id="calendar-header" class="flex items-center justify-between mb-4"></div>
            <div id="calendar-container"></div>
            <div id="calendar-list" class="mt-6"></div>
        </div>

        <!-- Typing Practice -->
        <div id="view-typing" style="display:none;">
            <div id="typing-stats" class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4"></div>
            <div id="typing-container"></div>
        </div>

        <!-- Teacher (admin only) -->
        <div id="view-teacher" style="display:none;" data-role-min="admin">
            <div id="teacher-container"></div>
        </div>

    </div><!-- /content area -->

    <!-- ═══════════════════════════════════════
         MODALS
         ═══════════════════════════════════════ -->

    <!-- Assign Lesson Modal -->
    <div class="modal-backdrop" id="assignLessonModal">
        <div class="modal-content">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-heading font-bold text-sm" style="color:var(--deft-txt);">Assign Lesson</h3>
                <button onclick="closeModal('assignLessonModal')" style="background:none;border:none;color:var(--deft-txt-3);cursor:pointer;font-size:1.2rem;">&times;</button>
            </div>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-medium mb-1" style="color:var(--deft-txt-2);">Lesson</label>
                    <select id="assignLessonSelect" class="school-select w-full"></select>
                </div>
                <div>
                    <label class="block text-xs font-medium mb-1" style="color:var(--deft-txt-2);">Date</label>
                    <input type="date" id="assignLessonDate" class="school-input">
                </div>
                <div>
                    <label class="block text-xs font-medium mb-1" style="color:var(--deft-txt-2);">Student</label>
                    <select id="assignStudentSelect" class="school-select w-full"></select>
                </div>
                <div class="flex gap-2 mt-4">
                    <button class="btn btn-ghost flex-1" onclick="closeModal('assignLessonModal')">Cancel</button>
                    <button class="btn btn-primary flex-1" onclick="submitAssignment()">Assign</button>
                </div>
            </div>
        </div>
    </div>

    <!-- YouTube Video Player Modal -->
    <div class="modal-backdrop" id="youtubeModal">
        <div class="modal-content" style="max-width:800px;padding:0;overflow:hidden;">
            <!-- Search bar -->
            <div style="padding:1rem 1.25rem;border-bottom:1px solid var(--deft-border);">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="font-heading font-bold text-sm" style="color:var(--deft-txt);">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="inline mr-1" style="color:var(--deft-danger);"><path d="M22.54 6.42a2.78 2.78 0 00-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 00-1.94 2A29 29 0 001 12a29 29 0 00.46 5.58A2.78 2.78 0 003.4 19.6C5.12 20 12 20 12 20s6.88 0 8.6-.46a2.78 2.78 0 001.94-2A29 29 0 0023 12a29 29 0 00-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="currentColor"/></svg>
                        Educational Videos
                    </h3>
                    <button onclick="closeVideoPlayer()" style="background:none;border:none;color:var(--deft-txt-3);cursor:pointer;font-size:1.2rem;padding:0.25rem;">&times;</button>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="youtubeSearchInput" class="school-input flex-1" placeholder="Search for videos..." onkeydown="if(event.key==='Enter')searchYouTube()">
                    <button class="btn btn-primary" onclick="searchYouTube()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        Search
                    </button>
                </div>
            </div>

            <!-- Video Player Area -->
            <div id="videoPlayerArea" style="display:none;">
                <div style="position:relative;width:100%;padding-top:56.25%;background:#000;">
                    <iframe id="videoPlayerFrame" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen></iframe>
                </div>
                <!-- Now Playing + Nav -->
                <div style="padding:0.75rem 1.25rem;border-bottom:1px solid var(--deft-border);background:var(--deft-surface-el);">
                    <div class="flex items-center justify-between">
                        <div class="flex-1 min-w-0 mr-3">
                            <p id="videoNowPlaying" class="text-sm font-medium truncate" style="color:var(--deft-txt);"></p>
                            <p id="videoNowChannel" class="text-xs" style="color:var(--deft-txt-3);"></p>
                        </div>
                        <div class="flex items-center gap-1">
                            <span id="videoCounter" class="text-xs font-mono mr-2" style="color:var(--deft-txt-3);">1/8</span>
                            <button onclick="prevVideo()" class="btn btn-ghost btn-sm" id="videoPrevBtn" title="Previous">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                            </button>
                            <button onclick="nextVideo()" class="btn btn-ghost btn-sm" id="videoNextBtn" title="Next">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                                Next
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Video List -->
            <div id="youtubeResults" style="padding:0.75rem;max-height:300px;overflow-y:auto;"></div>
        </div>
    </div>

    <!-- Lesson Review Modal (for AI-generated lessons) -->
    <div class="modal-backdrop" id="lessonReviewModal">
        <div class="modal-content" style="max-width:700px;max-height:90vh;overflow-y:auto;">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-heading font-bold text-sm" style="color:var(--deft-txt);">Review Generated Lesson</h3>

<!-- Auth Gate Logic -->
<script>
let gateSelectedProfile = null;

function getCachedProfiles(callback) {
    var CACHE_KEY = 'rdgr-profiles-cache';
    var CACHE_TTL = 300000;
    try {
        var cached = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
        if (cached.profiles && cached.ts && (Date.now() - cached.ts) < CACHE_TTL) {
            callback(cached.profiles);
            return;
        }
    } catch(e) {}
    fetch(SUPABASE_URL + '/rest/v1/deft_user_profiles?select=user_id,display_name,email,role&order=display_name', {
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY }
    }).then(r => r.json()).then(profiles => {
        if (profiles && Array.isArray(profiles) && profiles.length > 0) {
            localStorage.setItem(CACHE_KEY, JSON.stringify({ profiles: profiles, ts: Date.now() }));
        }
        callback(profiles);
    }).catch(() => callback([]));
}

function loadGateProfiles() {
    getCachedProfiles(function(profiles) {
        const container = document.getElementById('gateProfiles');
        if (!container || !profiles || !profiles.length) return;
        const saved = localStorage.getItem('rdgr-active-profile');
        let savedId = null;
        if (saved) { try { savedId = JSON.parse(saved).id; } catch(e) {} }
        const colors = { 'Bradford': '#06D6A0', 'Dianna': '#A855F7', 'Brianna': '#4CC9F0' };
        container.innerHTML = profiles.map(p => {
            const name = p.display_name || p.email || '?';
            const initial = name[0].toUpperCase();
            const color = colors[name] || '#8A95A9';
            const role = p.role || 'admin';
            const roleLabel = role === 'student' ? '<span style="font-size:0.625rem;color:#8A95A9;display:block;">Student</span>' : '<span style="font-size:0.625rem;color:#8A95A9;display:block;">Teacher</span>';
            return '<button type="button" onclick="selectGateProfile(\'' + p.user_id + '\',\'' + name.replace(/'/g, '&#39;') + '\',\'' + role + '\',this)" class="gate-profile-btn flex flex-col items-center gap-1.5 p-3 rounded-lg transition-all" style="background:rgba(255,255,255,0.02);border:2px solid transparent;cursor:pointer;min-width:80px;" onmouseenter="this.style.background=\'rgba(255,255,255,0.04)\'" onmouseleave="if(!this.classList.contains(\'selected\'))this.style.background=\'rgba(255,255,255,0.02)\'">' +
                '<div class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold" style="background:' + color + '20;color:' + color + ';border:2px solid transparent;">' + initial + '</div>' +
                '<span class="text-xs" style="color:#8A95A9;">' + name + '</span>' + roleLabel +
            '</button>';
        }).join('');
        if (savedId) {
            container.querySelectorAll('.gate-profile-btn').forEach(btn => {
                if (btn.getAttribute('onclick').includes(savedId)) btn.click();
            });
        }
    });
}

function selectGateProfile(userId, name, role, el) {
    gateSelectedProfile = { id: userId, name: name, role: role };
    document.querySelectorAll('.gate-profile-btn').forEach(btn => {
        btn.classList.remove('selected');
        btn.style.background = 'rgba(255,255,255,0.02)';
        btn.style.borderColor = 'transparent';
        btn.querySelector('.w-10').style.borderColor = 'transparent';
    });
    el.classList.add('selected');
    el.style.background = 'rgba(255,255,255,0.06)';
    el.style.borderColor = 'rgba(6,214,160,0.4)';
    el.querySelector('.w-10').style.borderColor = el.querySelector('.w-10').style.color;
    var btn = document.getElementById('gateSubmitBtn');
    btn.disabled = false;
    btn.style.opacity = '1';
    btn.textContent = 'Sign In as ' + name;
    document.getElementById('gateInput').focus();
}

function handleGate(e) {
    e.preventDefault();
    if (document.getElementById('gateInput').value === 'Advance1!') {
        localStorage.setItem('rdgr-session', JSON.stringify({ authenticated: true, ts: Date.now() }));
        if (gateSelectedProfile) {
            localStorage.setItem('rdgr-active-profile', JSON.stringify(gateSelectedProfile));
            activeProfileId = gateSelectedProfile.id;
            userRole = gateSelectedProfile.role || 'admin';
        }
        document.getElementById('gate').classList.add('hidden');
        document.getElementById('schoolApp').style.opacity = '1';
        initSchool();
        return false;
    }
    document.getElementById('gateError').classList.add('show');
    document.getElementById('gateInput').value = '';
    document.getElementById('gateInput').focus();
    setTimeout(() => document.getElementById('gateError').classList.remove('show'), 2000);
    return false;
}

// Auto-login if already authenticated
if (JSON.parse(localStorage.getItem('rdgr-session') || '{}').authenticated === true) {
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('schoolApp').style.opacity = '1';
    initSchool();
} else {
    loadGateProfiles();
}

// Helper: load assign modal dropdowns
async function loadAssignModalData() {
    const lessons = await supabaseSelect('school_lessons', 'select=lesson_id,title,subject&order=title');
    const sel = document.getElementById('assignLessonSelect');
    if (sel && lessons) {
        sel.innerHTML = lessons.map(l => '<option value="' + l.lesson_id + '">' + escapeHtml(l.title) + ' (' + l.subject + ')</option>').join('');
    }
    const students = await supabaseSelect('deft_user_profiles', 'role=eq.student&select=user_id,display_name');
    const sSel = document.getElementById('assignStudentSelect');
    if (sSel && students) {
        sSel.innerHTML = students.map(s => '<option value="' + s.user_id + '">' + escapeHtml(s.display_name) + '</option>').join('');
    }
    document.getElementById('assignLessonDate').value = todayStr();
}

async function submitAssignment() {
    const lessonId = document.getElementById('assignLessonSelect').value;
    const studentId = document.getElementById('assignStudentSelect').value;
    const date = document.getElementById('assignLessonDate').value;
    if (!lessonId || !studentId || !date) { toast('Please fill all fields', 'error'); return; }
    const result = await schoolApi('assign_lesson', { lesson_id: lessonId, student_id: studentId, assigned_date: date });
    if (result) {
        toast('Lesson assigned!', 'success');
        closeModal('assignLessonModal');
        if (currentView === 'lessons') refreshLessons();
        if (currentView === 'calendar') refreshCalendar();
    }
}

// ═══ Video Player State ═══
let videoPlaylist = [];
let videoCurrentIndex = 0;

async function searchYouTube() {
    const query = document.getElementById('youtubeSearchInput').value.trim();
    if (!query) return;
    const container = document.getElementById('youtubeResults');
    container.innerHTML = '<div class="text-center py-6"><div class="spinner"></div><p class="text-xs mt-2" style="color:var(--deft-txt-3);">Searching videos...</p></div>';
    document.getElementById('videoPlayerArea').style.display = 'none';

    const result = await schoolApi('search_youtube', { query: query }, { timeout: 20000 });
    if (result && result.videos && result.videos.length > 0) {
        videoPlaylist = result.videos;
        renderVideoList();
        // Auto-play first video
        playVideo(0);
    } else {
        videoPlaylist = [];
        container.innerHTML = '<div class="text-center py-6"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--deft-txt-3);margin:0 auto 0.5rem;display:block;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p class="text-sm" style="color:var(--deft-txt-3);">No videos found. Try different search terms.</p></div>';
    }
}

function renderVideoList() {
    const container = document.getElementById('youtubeResults');
    container.innerHTML = videoPlaylist.map(function(v, i) {
        var isActive = i === videoCurrentIndex;
        return '<button onclick="playVideo(' + i + ')" style="display:flex;align-items:center;gap:0.75rem;width:100%;padding:0.5rem 0.625rem;border-radius:8px;border:none;cursor:pointer;text-align:left;background:' + (isActive ? 'var(--deft-accent-dim)' : 'transparent') + ';transition:background 0.15s;" onmouseenter="if(' + i + '!==' + videoCurrentIndex + ')this.style.background=\'rgba(255,255,255,0.04)\'" onmouseleave="if(' + i + '!==' + videoCurrentIndex + ')this.style.background=\'transparent\'">' +
            '<div style="position:relative;flex-shrink:0;width:96px;height:54px;border-radius:6px;overflow:hidden;background:var(--deft-surface);">' +
                '<img src="' + escapeHtml(v.thumbnail) + '" alt="" style="width:100%;height:100%;object-fit:cover;">' +
                (isActive ? '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);"><svg width="16" height="16" viewBox="0 0 24 24" fill="var(--deft-accent)"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>' : '') +
            '</div>' +
            '<div style="flex:1;min-width:0;">' +
                '<p style="font-size:0.8125rem;font-weight:' + (isActive ? '600' : '500') + ';color:' + (isActive ? 'var(--deft-accent)' : 'var(--deft-txt)') + ';overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--deft-body-font),sans-serif;">' + escapeHtml(v.title) + '</p>' +
                '<p style="font-size:0.6875rem;color:var(--deft-txt-3);margin-top:2px;font-family:var(--deft-body-font),sans-serif;">' + escapeHtml(v.channel) + '</p>' +
            '</div>' +
            '<span style="font-size:0.6875rem;color:var(--deft-txt-3);flex-shrink:0;font-family:var(--deft-body-font),sans-serif;">' + (i + 1) + '</span>' +
        '</button>';
    }).join('');
}

function playVideo(index) {
    if (index < 0 || index >= videoPlaylist.length) return;
    videoCurrentIndex = index;
    var v = videoPlaylist[index];
    var frame = document.getElementById('videoPlayerFrame');
    frame.src = 'https://www.youtube-nocookie.com/embed/' + v.id + '?autoplay=1&rel=0&modestbranding=1';
    document.getElementById('videoNowPlaying').textContent = v.title;
    document.getElementById('videoNowChannel').textContent = v.channel;
    document.getElementById('videoCounter').textContent = (index + 1) + '/' + videoPlaylist.length;
    document.getElementById('videoPlayerArea').style.display = '';
    document.getElementById('videoPrevBtn').disabled = index === 0;
    document.getElementById('videoPrevBtn').style.opacity = index === 0 ? '0.3' : '1';
    document.getElementById('videoNextBtn').disabled = index === videoPlaylist.length - 1;
    document.getElementById('videoNextBtn').style.opacity = index === videoPlaylist.length - 1 ? '0.3' : '1';
    renderVideoList();
    // Scroll the active item into view in the list
    var list = document.getElementById('youtubeResults');
    var activeBtn = list.children[index];
    if (activeBtn) activeBtn.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function nextVideo() { playVideo(videoCurrentIndex + 1); }
function prevVideo() { playVideo(videoCurrentIndex - 1); }

function closeVideoPlayer() {
    var frame = document.getElementById('videoPlayerFrame');
    if (frame) frame.src = '';
    document.getElementById('videoPlayerArea').style.display = 'none';
    closeModal('youtubeModal');
}

// Pulse animation for nav dot
var pulseStyle = document.createElement('style');
pulseStyle.textContent = '@keyframes pulse{0%,100%{opacity:0.6;}50%{opacity:1;}}';
document.head.appendChild(pulseStyle);
</script>

<!-- Bug Report Console Capture -->
<script>
(function(){
var _ce=[],_cw=[];
var _oe=console.error,_ow=console.warn;
function _s(a){return Array.from(a).map(function(x){try{return typeof x==='object'?JSON.stringify(x):String(x)}catch(e){return String(x)}}).join(' ');}
console.error=function(){_ce.push({m:_s(arguments),t:new Date().toISOString()});if(_ce.length>50)_ce.shift();_ub();_oe.apply(console,arguments);};
console.warn=function(){_cw.push({m:_s(arguments),t:new Date().toISOString()});if(_cw.length>50)_cw.shift();_ow.apply(console,arguments);};
window.addEventListener('error',function(e){_ce.push({m:e.message+(e.filename?' at '+e.filename+':'+e.lineno:''),t:new Date().toISOString()});_ub();});
window.addEventListener('unhandledrejection',function(e){_ce.push({m:'Unhandled Promise: '+(e.reason&&e.reason.message||e.reason||'Unknown'),t:new Date().toISOString()});_ub();});
function _ub(){var b=document.getElementById('bugBadge');if(b){b.textContent=_ce.length;b.style.display=_ce.length>0?'flex':'none';}}
function _esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
window._openBugReport=function(){
var m=document.getElementById('bugReportModal');if(!m)return;
document.getElementById('bugPageUrl').textContent=location.pathname;
var log=document.getElementById('bugConsoleLog'),items=[];
_ce.forEach(function(e){items.push('<div class="bug-ce">[ERROR] '+_esc(e.m)+'</div>');});
_cw.forEach(function(w){items.push('<div class="bug-cw">[WARN] '+_esc(w.m)+'</div>');});
log.innerHTML=items.length?items.join(''):'<span class="bug-cn">No console errors captured</span>';
m.classList.add('active');
var ta=document.getElementById('bugDescription');if(ta)ta.focus();
};
window._submitBugReport=async function(){
var desc=document.getElementById('bugDescription').value.trim();
if(!desc){if(typeof toast==='function')toast('Please describe the issue','error');return;}
var btn=document.getElementById('bugSubmitBtn');if(btn){btn.disabled=true;btn.textContent='Submitting...';}
var SB='https://yrwrswyjawmgtxrgbnim.supabase.co';
var SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlyd3Jzd3lqYXdtZ3R4cmdibmltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzYzODY2MzMsImV4cCI6MjA1MTk2MjYzM30.CjKVHdkFnxFDyZSN4_5nTeX6K7SEu-DjvBH2lzfVrX8';
try{
var r=await fetch(SB+'/rest/v1/user_bug_reports',{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify({page_url:location.pathname,page_title:document.title,user_description:desc,console_errors:_ce,console_warnings:_cw,browser_info:{userAgent:navigator.userAgent,viewport:window.innerWidth+'x'+window.innerHeight,timestamp:new Date().toISOString()},priority:document.getElementById('bugPriority').value,status:'open'})});
if(r.ok){var d=await r.json();if(typeof toast==='function')toast('Bug report '+d[0].report_id+' submitted!','success');document.getElementById('bugDescription').value='';document.getElementById('bugReportModal').classList.remove('active');_ce.length=0;_cw.length=0;_ub();}
else{var e=await r.text();if(typeof toast==='function')toast('Failed: '+e,'error');}
}catch(ex){if(typeof toast==='function')toast('Error: '+ex.message,'error');}
finally{if(btn){btn.disabled=false;btn.textContent='Submit Bug Report';}}
};
})();
</script>
