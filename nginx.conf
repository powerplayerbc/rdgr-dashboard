server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Prevent browser caching of all pages
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;

    location / {
        # Prefer directory/index.html over standalone .html so /pantry → /pantry/index.html
        # (legacy *.html duplicates may exist in the repo but are stale; the directory
        # version is the canonical, currently-maintained dashboard for each page).
        try_files $uri $uri/ $uri.html =404;
    }
}
