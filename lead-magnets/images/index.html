  .panel { background:var(--deft-surface,#11131A); border:1px solid var(--deft-border,#2A2E3D); border-radius:0.75rem; overflow:hidden; }
  .panel-header { padding:0.875rem 1.25rem; border-bottom:1px solid var(--deft-border,#2A2E3D); display:flex; align-items:center; justify-content:space-between; }
  .panel-body { padding:1rem 1.25rem; }

  .btn-primary { background:rgba(6,214,160,0.15); color:#06D6A0; border:1px solid rgba(6,214,160,0.3); }
  .btn-primary:hover { background:rgba(6,214,160,0.25); }
  .btn-ghost { background:transparent; color:#8A95A9; border:1px solid var(--deft-border,#2A2E3D); }

  .form-input:focus { border-color:rgba(6,214,160,0.4); box-shadow:0 0 0 2px rgba(6,214,160,0.08); }
  select.form-input option { background:var(--deft-surface-el,#1A1D28); color:#E8ECF1; }

  .chip { display:inline-flex; align-items:center; gap:2px; padding:1px 7px; border-radius:999px; font-size:0.58rem; font-weight:500; background:rgba(76,201,240,0.1); color:#4CC9F0; border:1px solid rgba(76,201,240,0.15); white-space:nowrap; }
  .chip-sel { display:inline-flex; align-items:center; padding:2px 9px; border-radius:999px; font-size:0.65rem; font-weight:500; cursor:pointer; border:1px solid var(--deft-border,#2A2E3D); color:#8A95A9; background:transparent; transition:all .15s; }
  .chip-sel.on { background:rgba(6,214,160,0.12); color:#06D6A0; border-color:rgba(6,214,160,0.3); }

  .img-thumb { width:100%; aspect-ratio:1/1; object-fit:cover; background:var(--deft-surface-el,#1A1D28); display:block; }
  .img-thumb-ph { width:100%; aspect-ratio:1/1; display:flex; align-items:center; justify-content:center; background:var(--deft-surface-el,#1A1D28); color:#525E73; font-size:0.7rem; }
  .toggle { position:relative; display:inline-block; width:32px; height:18px; flex-shrink:0; }
  .toggle input { opacity:0; width:0; height:0; }
  .tslider { position:absolute; cursor:pointer; inset:0; background:#2A2E3D; border-radius:9px; transition:background 0.2s; }
  .tslider:before { content:''; position:absolute; width:14px; height:14px; left:2px; bottom:2px; background:#525E73; border-radius:50%; transition:transform 0.2s, background 0.2s; }
  .toggle input:checked + .tslider { background:rgba(6,214,160,0.25); }
  .toggle input:checked + .tslider:before { transform:translateX(14px); background:#06D6A0; }
  .empty-state { text-align:center; padding:3rem 1rem; color:#525E73; font-size:0.85rem; }
  .skeleton { background:linear-gradient(90deg,#1A1D28 25%,#242836 50%,#1A1D28 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:0.5rem; }
  @keyframes shimmer { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }
  .toast-container { position:fixed; bottom:1.5rem; right:1.5rem; z-index:200; display:flex; flex-direction:column; gap:0.5rem; }
  .toast { padding:0.75rem 1rem; border-radius:0.5rem; font-size:0.8rem; animation:toast-in 0.3s ease forwards; max-width:380px; }
  .toast-success { background:rgba(6,214,160,0.15); border:1px solid rgba(6,214,160,0.3); color:#06D6A0; }
  .toast-error { background:rgba(255,107,107,0.15); border:1px solid rgba(255,107,107,0.3); color:#FF6B6B; }
  @keyframes toast-in { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
</style>

<script src="/js/shared-nav.js?v=2026-06-28"></script>
<script>
'use strict';
const SUPABASE_URL = 'https://carltondb.72.60.67.2.sslip.io';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6ImNhcmx0b24iLCJpYXQiOjE3ODE2OTUzMDksImV4cCI6MjA5NzA1NTMwOX0.Tazw1TnCAXYY6Na6E7muccoLad3NrJltf9GUCPbNnSc';
const UPLOAD_WEBHOOK = 'https://n8n.carltonaiservices.com/webhook/dianna-asset-upload';
const BRAND = 'dianna';
const THEME_OPTS = ['fitness','homeschooling','ai','business','general'];
const CATEGORIES = ['headshot','lifestyle','background','logo','other'];

let images = [];
let upThemes = [];

function esc(str){ const d=document.createElement('div'); d.textContent=(str==null?'':str); return d.innerHTML; }
function attr(str){ return String(str==null?'':str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function toast(message, type='success'){ const c=document.getElementById('toasts'); const el=document.createElement('div'); el.className='toast toast-'+type; el.textContent=message; c.appendChild(el); setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.remove(),300); },4000); }
function fmtDate(s){ if(!s) return '—'; return new Date(s).toLocaleDateString('en-US',{timeZone:'America/Los_Angeles',month:'short',day:'numeric',year:'numeric'}); }
function gate(){ const pw=document.getElementById('gatePw').value; if(pw==='Advance1!'){ localStorage.setItem('rdgr-session',JSON.stringify({authenticated:true})); document.documentElement.classList.add('rdgr-authed'); init(); } else document.getElementById('gateErr').textContent='Wrong password'; }

async function sbSelect(table, query=''){ const url=`${SUPABASE_URL}/rest/v1/${table}?${query}`; try { const res=await fetch(url,{ headers:{ 'apikey':SUPABASE_ANON_KEY, 'Authorization':`Bearer ${SUPABASE_ANON_KEY}` }}); if(!res.ok){ console.error('select err', res.status, await res.text()); return null; } return await res.json(); } catch(e){ console.error('select fetch err', table, e); return null; } }
async function sbWrite(table, method, body, matchQuery=''){ const url=`${SUPABASE_URL}/rest/v1/${table}?${matchQuery}`; try { const res=await fetch(url,{ method, headers:{ 'apikey':SUPABASE_ANON_KEY, 'Authorization':`Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type':'application/json', 'Prefer':'return=representation' }, body: method==='DELETE'?undefined:JSON.stringify(body) }); if(!res.ok){ console.error('write err', res.status, await res.text()); return null; } const t=await res.text(); return t?JSON.parse(t):true; } catch(e){ console.error('write err', e); return null; } }

// ── upload theme selector ──
function renderUpThemes(){
  const wrap=document.getElementById('upThemes');
  const all=Array.from(new Set([...THEME_OPTS, ...upThemes]));
  wrap.innerHTML = all.map(t=>`<span class="chip-sel ${upThemes.includes(t)?'on':''}" onclick="toggleUpTheme('${esc(t)}')">${esc(t)}</span>`).join('');
}
function toggleUpTheme(t){ const i=upThemes.indexOf(t); if(i>-1) upThemes.splice(i,1); else upThemes.push(t); renderUpThemes(); }
function addUpTheme(input){ const v=input.value.trim().toLowerCase(); if(v && !upThemes.includes(v)) upThemes.push(v); input.value=''; renderUpThemes(); }

function readFileBase64(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload = ()=>{ const s=String(r.result||''); const comma=s.indexOf(','); resolve(comma>-1 ? s.slice(comma+1) : s); };
    r.onerror = ()=>reject(r.error||new Error('read failed'));
    r.readAsDataURL(file);
  });
}

async function uploadImage(){
  const fileEl=document.getElementById('upFile');
  const file=fileEl.files && fileEl.files[0];
  if(!file){ toast('Choose an image file first','error'); return; }
  const label=document.getElementById('upLabel').value.trim();
  if(!label){ toast('Add a label','error'); return; }
  const category=document.getElementById('upCategory').value;
  const has_transparency=document.getElementById('upTransparent').checked;
  const btn=document.getElementById('upBtn'); const st=document.getElementById('upStatus');
  btn.disabled=true; btn.textContent='Uploading…'; st.textContent='reading file…';
  try {
    const b64=await readFileBase64(file);
    st.textContent='uploading to Drive…';
    const res=await fetch(UPLOAD_WEBHOOK,{
      method:'POST', headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ kind:'image', slug:'image-bank', file_name:file.name, mime_type:file.type||'image/jpeg', file_base64:b64 })
    });
    if(!res.ok){ throw new Error('webhook '+res.status+': '+(await res.text())); }
    const data=await res.json();
    if(!data || !data.ok){ throw new Error((data && data.error) || 'upload webhook returned failure'); }
    st.textContent='saving record…';
    const row=await sbWrite('brand_image_bank','POST',{
      brand_id: BRAND,
      label,
      category,
      themes: upThemes.slice(),
      has_transparency,
      drive_file_id: data.drive_file_id || null,
      url: data.thumbnail_url || data.download_url || data.view_url || null,
      is_active: true
    });
    if(!row){ throw new Error('saved to Drive but failed to write DB row'); }
    toast('Image added');
    // reset form
    fileEl.value=''; document.getElementById('upLabel').value=''; document.getElementById('upTransparent').checked=false; upThemes=[]; renderUpThemes(); st.textContent='';
    await loadImages();
  } catch(e){
    console.error('upload error', e);
    toast('Upload failed: '+(e.message||e), 'error'); st.textContent='';
  } finally { btn.disabled=false; btn.textContent='Upload'; }
}

// ── grid ──
async function loadImages(){
  const grid=document.getElementById('imgGrid');
  grid.innerHTML = Array.from({length:4}).map(()=>'<div class="skeleton" style="height:240px;"></div>').join('');
  const rows=await sbSelect('brand_image_bank', `brand_id=eq.${BRAND}&order=created_at.desc&select=*`);
  if(rows===null){ grid.innerHTML='<div class="empty-state" style="grid-column:1/-1;color:#FF6B6B;">Failed to load images. Check connection and try again.</div>'; return; }
  images = Array.isArray(rows)?rows:[];
  if(!images.length){ grid.innerHTML='<div class="empty-state" style="grid-column:1/-1;">No images yet. Use the form above to add Dianna\'s photos.</div>'; return; }
  grid.innerHTML = images.map(imgCard).join('');
}
function imgCard(im){
  const src = im.url || (im.drive_file_id ? `https://drive.google.com/thumbnail?id=${encodeURIComponent(im.drive_file_id)}&sz=w600` : '');
  const thumb = src
    ? `<img class="img-thumb" src="${attr(src)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'img-thumb-ph\\'>image unavailable</div>'">`
    : `<div class="img-thumb-ph">no preview</div>`;
  const themes=(im.themes||[]).map(t=>`<span class="chip">${esc(t)}</span>`).join(' ');
  return `<div class="img-card" id="card-${im.id}">
    ${thumb}
    <div style="padding:0.6rem 0.7rem;">
      <div class="flex items-start justify-between gap-2 mb-1">
        <div class="text-sm font-medium leading-tight">${esc(im.label||'Untitled')}</div>
        <span class="cat-badge">${esc(im.category||'other')}</span>
      </div>
      <div class="flex flex-wrap gap-1 mb-2 items-center" style="min-height:14px;">${themes}${im.has_transparency?'<span class="chip" title="Transparent background — can overlay colored sections" style="border-color:#7c5cff;color:#b9a6ff;">transparent</span>':''}</div>
      <div class="flex items-center justify-between text-[0.6rem] text-txt-3 mb-2">
        <span>used ${im.usage_count!=null?im.usage_count:0}×</span>
        <span>${im.last_used_at?('last '+fmtDate(im.last_used_at)):fmtDate(im.created_at)}</span>
      </div>
      <div class="flex items-center justify-between gap-2">
        <label class="flex items-center gap-1.5 text-[0.6rem] text-txt-2">
          <span class="toggle"><input type="checkbox" ${im.is_active?'checked':''} onchange="toggleActive('${im.id}', this.checked)"><span class="tslider"></span></span>
          active
        </label>
        <div class="flex gap-1.5">
          <button class="btn btn-ghost btn-xs" onclick="editImage('${im.id}')">Edit</button>
          <button class="btn btn-deny btn-xs" onclick="deleteImage('${im.id}')">Delete</button>
        </div>
      </div>
      <div id="edit-${im.id}" class="hidden mt-2 pt-2" style="border-top:1px solid var(--deft-border,#2A2E3D);"></div>
    </div>
  </div>`;
}

async function toggleActive(id, val){
  const res=await sbWrite('brand_image_bank','PATCH',{ is_active: val }, `id=eq.${id}`);
  if(res){ const im=images.find(x=>x.id===id); if(im) im.is_active=val; toast('Updated'); }
  else { toast('Failed to update','error'); loadImages(); }
}

function editImage(id){
  const im=images.find(x=>x.id===id); if(!im) return;
  const box=document.getElementById('edit-'+id);
  if(!box.classList.contains('hidden')){ box.classList.add('hidden'); box.innerHTML=''; return; }
  const allThemes=Array.from(new Set([...THEME_OPTS, ...(im.themes||[])]));
  box.classList.remove('hidden');
  box.innerHTML = `
    <label class="form-label">Label</label>
    <input class="form-input mb-2" id="ed-label-${id}" value="${attr(im.label||'')}">
    <label class="form-label">Category</label>
    <select class="form-input mb-2" id="ed-cat-${id}">${CATEGORIES.map(c=>`<option value="${c}" ${im.category===c?'selected':''}>${c}</option>`).join('')}</select>
    <label class="form-label">Themes</label>
    <div class="flex flex-wrap gap-1.5 mb-2" id="ed-themes-${id}">${allThemes.map(t=>`<span class="chip-sel ${ (im.themes||[]).includes(t)?'on':''}" data-t="${attr(t)}" onclick="this.classList.toggle('on')">${esc(t)}</span>`).join('')}</div>
    <label class="flex items-center gap-2 text-xs text-txt-2 mb-2" style="cursor:pointer;">
      <input type="checkbox" id="ed-trans-${id}" ${im.has_transparency?'checked':''}> Transparent background
    </label>
    <div class="flex gap-1.5">
      <button class="btn btn-primary btn-xs" onclick="saveImage('${id}')">Save</button>
      <button class="btn btn-ghost btn-xs" onclick="editImage('${id}')">Cancel</button>
    </div>`;
}
async function saveImage(id){
  const label=document.getElementById('ed-label-'+id).value.trim();
  const category=document.getElementById('ed-cat-'+id).value;
  const themes=Array.from(document.querySelectorAll('#ed-themes-'+id+' .chip-sel.on')).map(el=>el.getAttribute('data-t'));
  const has_transparency=document.getElementById('ed-trans-'+id).checked;
  const res=await sbWrite('brand_image_bank','PATCH',{ label, category, themes, has_transparency }, `id=eq.${id}`);
  if(res){ toast('Image updated'); await loadImages(); }
  else { toast('Failed to update image','error'); }
}
async function deleteImage(id){
  if(!confirm('Delete this image from the bank? (Drive file is not removed.)')) return;
  const res=await sbWrite('brand_image_bank','DELETE',null, `id=eq.${id}`);
  if(res){ toast('Image deleted'); await loadImages(); }
  else { toast('Failed to delete','error'); }
}

function init(){ renderUpThemes(); loadImages(); }
if(JSON.parse(localStorage.getItem('rdgr-session')||'{}').authenticated) init();
</script>
</body>
</html>
