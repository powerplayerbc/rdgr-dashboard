// ── utils ──
function esc(str){ const d=document.createElement('div'); d.textContent = (str==null?'':str); return d.innerHTML; }
function toast(message, type='success'){
  const c=document.getElementById('toasts'); const el=document.createElement('div');
  el.className='toast toast-'+type; el.textContent=message; c.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.remove(),300); },4000);
}
function openModal(id){ document.getElementById(id).classList.add('active'); }
function closeModal(id){ document.getElementById(id).classList.remove('active'); }
function fmtDate(s){ if(!s) return '—'; return new Date(s).toLocaleString('en-US',{timeZone:'America/Los_Angeles',month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',hour12:true}); }
function activeProfileName(){ try{ const p=JSON.parse(localStorage.getItem('rdgr-active-profile')||'{}'); return p.name||'qa-agent'; }catch(e){ return 'qa-agent'; } }

// ── gate ──
function gate(){
  const pw=document.getElementById('gatePw').value;
  if(pw==='Advance1!'){ localStorage.setItem('rdgr-session',JSON.stringify({authenticated:true})); document.documentElement.classList.add('rdgr-authed'); init(); }

// ── PostgREST helpers ──
async function sbSelect(table, query=''){
  const url=`${SUPABASE_URL}/rest/v1/${table}?${query}`;
  try {
    const res=await fetch(url,{ headers:{ 'apikey':SUPABASE_ANON_KEY, 'Authorization':`Bearer ${SUPABASE_ANON_KEY}` }});
    if(!res.ok){ console.error('Supabase select error:', res.status, await res.text()); return null; }
    return await res.json();
  } catch(err){ console.error('Supabase select fetch error:', table, err); return null; }
}
async function sbWrite(table, method, body, matchQuery=''){
  const url=`${SUPABASE_URL}/rest/v1/${table}?${matchQuery}`;
  try {
    const res=await fetch(url,{
      method,
      headers:{ 'apikey':SUPABASE_ANON_KEY, 'Authorization':`Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type':'application/json', 'Prefer':'return=representation' },
      body: method==='DELETE' ? undefined : JSON.stringify(body)
    });
    if(!res.ok){ const t=await res.text(); console.error('Supabase write error:', res.status, t); return null; }
    const text=await res.text(); return text ? JSON.parse(text) : true;
  } catch(err){ console.error('Supabase write error:', err); return null; }
}

// ═══ LIBRARY ═══
async function loadLibrary(){
  const grid=document.getElementById('libGrid');
  grid.innerHTML = Array.from({length:4}).map(()=>'<div class="skeleton" style="height:230px;"></div>').join('');
  const rows=await sbSelect('lead_magnets', `brand_id=eq.${BRAND}&order=updated_at.desc&select=*`);
  if(rows===null){ grid.innerHTML='<div class="empty-state" style="grid-column:1/-1;color:#FF6B6B;">Failed to load lead magnets. Check connection and try again.</div>'; return; }
  magnets = Array.isArray(rows) ? rows : [];
  if(!magnets.length){ grid.innerHTML='<div class="empty-state" style="grid-column:1/-1;">No lead magnets yet. Click <strong>+ New Idea</strong> to start one.</div>'; return; }
  grid.innerHTML = magnets.map(libCard).join('');
}
function libCard(m){
  const themes=(m.themes||[]).map(t=>`<span class="chip">${esc(t)}</span>`).join(' ');
  const cover = m.cover_image_url
    ? `<img class="lm-cover" src="${esc(m.cover_image_url)}" alt="" onerror="this.outerHTML='<div class=\\'lm-cover-ph\\'>cover unavailable</div>'">`
    : `<div class="lm-cover-ph">no cover yet</div>`;
  const bc = (m.broadcast_status && m.broadcast_status!=='none')
    ? `<span class="badge bc-${esc(m.broadcast_status)}">${esc(m.broadcast_status)}</span>` : '';
  const miss = (Array.isArray(m.missing_assets) && m.missing_assets.length)
    ? `<span class="badge" title="${esc(m.missing_assets.length+' image(s) Claude flagged as needed but could not capture')}" style="background:#5a3a00;color:#ffd27a;">⚠ ${m.missing_assets.length} img</span>` : '';
  return `<div class="lm-card" onclick="openDetail('${m.id}')">
    ${cover}
    ${miss?`<div style="position:absolute;top:8px;left:8px;">${miss}</div>`:''}
    <div style="padding:0.75rem 0.875rem;">
      <div class="flex items-start justify-between gap-2 mb-1.5">
        <div class="font-heading font-semibold text-sm leading-tight">${esc(m.title||'Untitled')}</div>
        <span class="badge st-${esc(m.status||'draft')}">${esc(m.status||'draft')}</span>
      </div>
      <div class="flex flex-wrap gap-1 mb-2">${themes||'<span class="text-txt-3 text-xs">no themes</span>'}</div>
      <div class="flex items-center justify-between text-xs text-txt-3">
        <span class="font-mono">v${m.current_version!=null?m.current_version:0}</span>
        <span>${bc}</span>
      </div>
    </div>
  </div>`;
}

// ═══ NEW IDEA MODAL ═══
function renderThemeSelector(){
  const wrap=document.getElementById('nmThemes');
  const all = Array.from(new Set([...THEME_OPTS, ...selectedThemes]));
  wrap.innerHTML = all.map(t=>`<span class="chip-sel ${selectedThemes.includes(t)?'on':''}" onclick="toggleTheme('${esc(t)}')">${esc(t)}</span>`).join('');
}
function toggleTheme(t){
  const i=selectedThemes.indexOf(t);
  if(i>-1) selectedThemes.splice(i,1); else selectedThemes.push(t);
  renderThemeSelector();
}
function addCustomTheme(input){
  const v=input.value.trim().toLowerCase();
  if(v && !selectedThemes.includes(v)) selectedThemes.push(v);
  input.value=''; renderThemeSelector();
}
async function createIdea(){
  const title=document.getElementById('nmTitle').value.trim();
  if(!title){ toast('Title is required','error'); return; }
  const btn=document.getElementById('nmSubmit'); btn.disabled=true; btn.textContent='Creating…';
  const slug = title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,80) || ('lm-'+Date.now());
  const body={
    brand_id: BRAND,
    title,
    slug,
    status: 'draft',
    idea_input: document.getElementById('nmIdea').value.trim() || null,
    audience: document.getElementById('nmAudience').value.trim() || null,
    goal_cta: document.getElementById('nmGoal').value.trim() || null,
    desired_length: document.getElementById('nmLength').value,
    themes: selectedThemes.slice(),
    current_version: 0,
    broadcast_status: 'none',
    created_by: activeProfileName()
  };
  const res=await sbWrite('lead_magnets','POST',body);
  btn.disabled=false; btn.textContent='Create';
  if(res){
    toast('Lead magnet idea created');
    closeModal('newModal');
    // reset form
    document.getElementById('nmTitle').value=''; document.getElementById('nmIdea').value='';
    document.getElementById('nmAudience').value=''; document.getElementById('nmGoal').value='';
    selectedThemes=[]; renderThemeSelector();
    await loadLibrary();
  } else { toast('Failed to create idea','error'); }
}

// ═══ DETAIL ═══
function showLibrary(){
  document.getElementById('detailView').classList.add('hidden');
  document.getElementById('libraryView').classList.remove('hidden');
  if(history.pushState) history.pushState({}, '', '/lead-magnets');
}
async function openDetail(id){
  if(history.pushState) history.pushState({}, '', '/lead-magnets?id='+id);
  document.getElementById('libraryView').classList.add('hidden');
  const dv=document.getElementById('detailView'); dv.classList.remove('hidden');
  document.getElementById('detailBody').innerHTML='<div class="skeleton" style="height:300px;"></div>';
  window.scrollTo(0,0);
  const rows=await sbSelect('lead_magnets', `id=eq.${id}&select=*&limit=1`);
  if(!rows || !rows.length){ document.getElementById('detailBody').innerHTML='<div class="empty-state" style="color:#FF6B6B;">Lead magnet not found.</div>'; return; }
  activeMagnet = rows[0];
  const versions = await sbSelect('lead_magnet_versions', `lead_magnet_id=eq.${id}&order=version.desc&select=*`) || [];
  renderDetail(activeMagnet, versions);
}
function renderDetail(m, versions){
  const themes=(m.themes||[]).map(t=>`<span class="chip">${esc(t)}</span>`).join(' ') || '<span class="text-txt-3 text-xs">no themes</span>';
  const cover = m.cover_image_url
    ? `<img src="${esc(m.cover_image_url)}" alt="" style="max-width:280px;width:100%;border-radius:0.5rem;border:1px solid var(--deft-border,#2A2E3D);" onerror="this.style.display='none'">`
    : `<div class="lm-cover-ph" style="max-width:280px;border-radius:0.5rem;border:1px solid var(--deft-border,#2A2E3D);">no cover yet</div>`;

  const pdfBtn = m.pdf_url ? `<a href="${esc(m.pdf_url)}" target="_blank" rel="noopener" class="btn btn-warn" style="text-decoration:none;display:inline-flex;align-items:center;">Open PDF &nearr;</a>` : '';
  const iframe = m.drive_file_id ? `<div class="panel mt-4"><div class="panel-header"><h3 class="font-heading font-semibold text-sm">Document Preview</h3></div><iframe src="https://drive.google.com/file/d/${esc(m.drive_file_id)}/preview" style="width:100%;height:520px;border:0;display:block;" allow="autoplay"></iframe></div>` : '';

  const verHtml = versions.length ? versions.map(v=>{
    const pending = !v.pdf_url;
    const links = [];
    if(v.cover_image_url) links.push(`<a href="${esc(v.cover_image_url)}" target="_blank" rel="noopener" class="text-accent" style="text-decoration:underline;">cover</a>`);
    if(v.pdf_url) links.push(`<a href="${esc(v.pdf_url)}" target="_blank" rel="noopener" class="text-accent" style="text-decoration:underline;">pdf</a>`);
    return `<div class="ver-row">
      <div class="flex items-center justify-between gap-2 mb-1">
        <div class="flex items-center gap-2">
          <span class="font-mono font-semibold text-sm">v${v.version}</span>
          ${pending?'<span class="badge st-generating"><span class="spin" style="vertical-align:-1px;margin-right:4px;"></span>generating…</span>':''}
        </div>
        <span class="text-xs text-txt-3">${fmtDate(v.created_at)}</span>
      </div>
      ${v.change_request?`<div class="text-xs text-txt-2 mb-1"><span class="text-txt-3">change request:</span> ${esc(v.change_request)}</div>`:''}
      ${v.notes?`<div class="text-xs text-txt-2 mb-1">${esc(v.notes)}</div>`:''}
      ${links.length?`<div class="flex gap-3 text-xs mt-1">${links.join('')}</div>`:''}
    </div>`;
  }).join('') : '<div class="empty-state">No versions yet. Request changes below to queue generation.</div>';

  const bc = m.broadcast_status || 'none';

  document.getElementById('detailBody').innerHTML = `
    <div class="flex items-start justify-between flex-wrap gap-3 mb-4">
      <div>
        <div class="flex items-center gap-2 flex-wrap mb-1">
          <h1 class="text-2xl font-bold">${esc(m.title||'Untitled')}</h1>
          <span class="badge st-${esc(m.status||'draft')}">${esc(m.status||'draft')}</span>
          <span class="font-mono text-xs text-txt-3">v${m.current_version!=null?m.current_version:0}</span>
        </div>
        <div class="flex flex-wrap gap-1.5 mb-2">${themes}</div>
        <div class="text-sm text-txt-2 space-y-0.5">
          ${m.audience?`<div><span class="text-txt-3">Audience:</span> ${esc(m.audience)}</div>`:''}
          ${m.goal_cta?`<div><span class="text-txt-3">Goal / CTA:</span> ${esc(m.goal_cta)}</div>`:''}
          ${m.desired_length?`<div><span class="text-txt-3">Length:</span> ${esc(m.desired_length)}</div>`:''}
        </div>
      </div>
    </div>

    ${m.synopsis||m.value_hook?`<div class="panel mb-4"><div class="panel-body">
      ${m.value_hook?`<div class="text-sm mb-2"><span class="text-txt-3 text-xs uppercase tracking-wide">Value Hook</span><br>${esc(m.value_hook)}</div>`:''}
      ${m.synopsis?`<div class="text-sm text-txt-2"><span class="text-txt-3 text-xs uppercase tracking-wide">Synopsis</span><br>${esc(m.synopsis)}</div>`:''}
    </div></div>`:''}

    <div class="grid gap-4" style="grid-template-columns:280px 1fr;align-items:start;">
      <div>
        ${cover}
        <div class="flex flex-wrap gap-2 mt-3">${pdfBtn}</div>
      </div>
      <div>
        <div class="panel">
          <div class="panel-header"><h3 class="font-heading font-semibold text-sm">Request Changes</h3></div>
          <div class="panel-body">
            <p class="text-xs text-txt-2 mb-2">Queue a new version. This sets status to <strong>generating</strong> and Claude Code will fill in the new draft.</p>
            <textarea id="changeReq" class="form-input mb-2" placeholder="e.g. make the intro punchier, add a checklist on page 2, swap the cover photo..."></textarea>
            <button class="btn btn-warn" id="changeBtn" onclick="requestChanges()">Submit change request</button>
          </div>
        </div>

        <div class="panel mt-4">
          <div class="panel-header">
            <h3 class="font-heading font-semibold text-sm">Status Controls</h3>
            <span class="text-xs text-txt-3">Broadcast: <span class="badge bc-${esc(bc)}">${esc(bc)}</span></span>
          </div>
          <div class="panel-body">
            <div class="flex flex-wrap gap-2 mb-2">
              <button class="btn btn-approve" onclick="setStatus('approved')">Mark approved</button>
              <button class="btn btn-ghost" onclick="setStatus('review')">Send to review</button>
              <button class="btn btn-ghost" onclick="setStatus('draft')">Back to draft</button>
            </div>
            <p class="text-xs text-txt-3">Publishing &amp; broadcast (sending to subscribers) is done from Claude Code after approval.</p>
          </div>
        </div>
      </div>
    </div>

    ${iframe}

    <div class="panel mt-4">
      <div class="panel-header"><h3 class="font-heading font-semibold text-sm">Version History</h3></div>
      <div class="panel-body">${verHtml}</div>
    </div>
  `;
}

async function requestChanges(){
  if(!activeMagnet) return;
  const txt=document.getElementById('changeReq').value.trim();
  if(!txt){ toast('Describe the change you want','error'); return; }
  const btn=document.getElementById('changeBtn'); btn.disabled=true; btn.textContent='Submitting…';
  const nextVer = (activeMagnet.current_version!=null?activeMagnet.current_version:0) + 1;
  // 1) placeholder version row (pdf null = "requested / generating")
  const verRes=await sbWrite('lead_magnet_versions','POST',{
    lead_magnet_id: activeMagnet.id,
    version: nextVer,
    change_request: txt,
    created_by: activeProfileName()
  });
  // 2) flip the magnet to generating
  const mRes=await sbWrite('lead_magnets','PATCH',{ status:'generating' }, `id=eq.${activeMagnet.id}`);
  btn.disabled=false; btn.textContent='Submit change request';
  if(verRes && mRes){
    toast('Change request queued (v'+nextVer+')');
    document.getElementById('changeReq').value='';
    openDetail(activeMagnet.id);
  } else { toast('Failed to submit change request','error'); }
}

async function setStatus(status){
  if(!activeMagnet) return;
  const res=await sbWrite('lead_magnets','PATCH',{ status }, `id=eq.${activeMagnet.id}`);
  if(res){ toast('Status set to '+status); openDetail(activeMagnet.id); }
  else { toast('Failed to update status','error'); }
}

// ── deep-link / nav ──
function routeFromUrl(){
  const id=new URLSearchParams(location.search).get('id');
  if(id){ openDetail(id); } else { showLibraryInitial(); }
}
function showLibraryInitial(){
  document.getElementById('detailView').classList.add('hidden');
  document.getElementById('libraryView').classList.remove('hidden');
}
window.addEventListener('popstate', ()=>{ routeFromUrl(); });

// ── init ──
function init(){
  renderThemeSelector();
  loadLibrary();
  routeFromUrl();
}
if(JSON.parse(localStorage.getItem('rdgr-session')||'{}').authenticated) init();
</script>
</body>
</html>
