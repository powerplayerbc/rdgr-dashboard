<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>JS Chain Test</title></head>
<body>
<h3>JS Chain Test - All Files In Order</h3>
<pre id="log"></pre>
<script>
function log(msg) {
    document.getElementById('log').textContent += msg + '\n';
    console.log(msg);
}
window.onerror = function(msg, src, line, col, err) {
    var file = src ? src.split('/').pop() : '?';
    log('SCRIPT ERROR: ' + msg + ' in ' + file + ':' + line);
    return true;
};
log('Starting load chain...');
</script>

<script src="js/school-config.js" onerror="log('NETWORK FAIL: school-config.js')" onload="log('1. school-config.js OK')"></script>
