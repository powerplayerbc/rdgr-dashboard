<script>
// ═══ Auth Gate ═══
var gateSelectedProfile = null;
function getCachedProfiles(cb) {
    var CK='rdgr-profiles-cache',CT=300000;
    try { var c=JSON.parse(localStorage.getItem(CK)||'{}'); if(c.profiles&&c.ts&&(Date.now()-c.ts)<CT){ cb(c.profiles); return; } } catch(e){}
    fetch(SUPABASE_URL+'/rest/v1/deft_user_profiles?select=user_id,display_name,email,role&order=display_name',
        {headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY}})
    .then(function(r){return r.json();}).then(function(p){
        if(p&&Array.isArray(p)&&p.length>0) localStorage.setItem(CK,JSON.stringify({profiles:p,ts:Date.now()}));
        cb(p);
    }).catch(function(){cb([]);});
}
function loadGateProfiles() {
    getCachedProfiles(function(profiles) {
        var c=document.getElementById('gateProfiles'); if(!c||!profiles||!profiles.length)return;
        var saved=localStorage.getItem('rdgr-active-profile'),savedId=null;
        if(saved)try{savedId=JSON.parse(saved).id;}catch(e){}
        var colors={'Bradford':'#06D6A0','Dianna':'#A855F7','Brianna':'#4CC9F0'};
        c.innerHTML=profiles.map(function(p){
            var n=p.display_name||p.email||'?',i=n[0].toUpperCase(),col=colors[n]||'#8A95A9',role=p.role||'student';
            var rl=role==='student'?'<span style="font-size:.625rem;color:#8A95A9;display:block;">Student</span>':'<span style="font-size:.625rem;color:#8A95A9;display:block;">Teacher</span>';
            return '<button type="button" onclick="selectGateProfile(\''+p.user_id+'\',\''+n.replace(/'/g,'&#39;')+'\',\''+role+'\',this)" class="gate-profile-btn flex flex-col items-center gap-1.5 p-3 rounded-lg transition-all" style="background:rgba(255,255,255,.02);border:2px solid transparent;cursor:pointer;min-width:80px;"><div class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold" style="background:'+col+'20;color:'+col+';border:2px solid transparent;">'+i+'</div><span class="text-xs" style="color:#8A95A9;">'+n+'</span>'+rl+'</button>';
        }).join('');
        if(savedId)c.querySelectorAll('.gate-profile-btn').forEach(function(b){if(b.getAttribute('onclick').indexOf(savedId)>-1)b.click();});
    });
}
function selectGateProfile(userId,name,role,el) {
    gateSelectedProfile={id:userId,name:name,role:role};
    document.querySelectorAll('.gate-profile-btn').forEach(function(b){b.classList.remove('selected');b.style.background='rgba(255,255,255,.02)';b.style.borderColor='transparent';b.querySelector('.w-10').style.borderColor='transparent';});
    el.classList.add('selected');el.style.background='rgba(255,255,255,.06)';el.style.borderColor='rgba(6,214,160,.4)';el.querySelector('.w-10').style.borderColor=el.querySelector('.w-10').style.color;
    var btn=document.getElementById('gateSubmitBtn');btn.disabled=false;btn.style.opacity='1';btn.textContent='Sign In as '+name;document.getElementById('gateInput').focus();
}
function handleGate(e) {
    e.preventDefault();
    if(document.getElementById('gateInput').value==='Advance1!'){
        localStorage.setItem('rdgr-session',JSON.stringify({authenticated:true,ts:Date.now()}));
        if(gateSelectedProfile){localStorage.setItem('rdgr-active-profile',JSON.stringify(gateSelectedProfile));activeProfileId=gateSelectedProfile.id;userRole=gateSelectedProfile.role||'student';}
        document.getElementById('gate').classList.add('hidden');document.getElementById('schoolApp').style.opacity='1';
        initPage();return false;
    }
    document.getElementById('gateError').classList.add('show');document.getElementById('gateInput').value='';document.getElementById('gateInput').focus();
    setTimeout(function(){document.getElementById('gateError').classList.remove('show');},2000);return false;
}
if(JSON.parse(localStorage.getItem('rdgr-session')||'{}').authenticated===true){
    document.getElementById('gate').classList.add('hidden');document.getElementById('schoolApp').style.opacity='1';initPage();
} else { loadGateProfiles(); }

async function initPage() {
    var saved=localStorage.getItem('rdgr-active-profile');
    if(saved)try{var p=JSON.parse(saved);activeProfileId=p.id;activeProfileName=p.name;userRole=p.role||'student';
        var ne=document.getElementById('profileName'),ae=document.getElementById('profileAvatar');
        if(ne)ne.textContent=p.name;if(ae)ae.textContent=p.name[0].toUpperCase();
    }catch(e){}
    applyRoleVisibility();
    loadProfiles();
    // UBR-0158/0160: reconcile cached role with DB before render
    await revalidateProfileFromDB();
    refreshHistory();
}

// Pulse animation
var ps=document.createElement('style');ps.textContent='@keyframes pulse{0%,100%{opacity:.6;}50%{opacity:1;}}';document.head.appendChild(ps);
</script>

<!-- Bug Report Console Capture -->
<script>
(function(){var _ce=[],_cw=[];var _oe=console.error,_ow=console.warn;
function _s(a){return Array.from(a).map(function(x){try{return typeof x==='object'?JSON.stringify(x):String(x)}catch(e){return String(x)}}).join(' ');}
console.error=function(){_ce.push({m:_s(arguments),t:new Date().toISOString()});if(_ce.length>50)_ce.shift();_ub();_oe.apply(console,arguments);};
console.warn=function(){_cw.push({m:_s(arguments),t:new Date().toISOString()});if(_cw.length>50)_cw.shift();_ow.apply(console,arguments);};
window.addEventListener('error',function(e){_ce.push({m:e.message+(e.filename?' at '+e.filename+':'+e.lineno:''),t:new Date().toISOString()});_ub();});
window.addEventListener('unhandledrejection',function(e){_ce.push({m:'Unhandled Promise: '+(e.reason&&e.reason.message||e.reason||'Unknown'),t:new Date().toISOString()});_ub();});
function _ub(){var b=document.getElementById('bugBadge');if(b){b.textContent=_ce.length;b.style.display=_ce.length>0?'flex':'none';}}
function _esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
window._openBugReport=function(){var m=document.getElementById('bugReportModal');if(!m)return;document.getElementById('bugPageUrl').textContent=location.pathname;
var log=document.getElementById('bugConsoleLog'),items=[];_ce.forEach(function(e){items.push('<div class="bug-ce">[ERROR] '+_esc(e.m)+'</div>');});_cw.forEach(function(w){items.push('<div class="bug-cw">[WARN] '+_esc(w.m)+'</div>');});
log.innerHTML=items.length?items.join(''):'<span class="bug-cn">No errors</span>';m.classList.add('active');var ta=document.getElementById('bugDescription');if(ta)ta.focus();};
window._submitBugReport=async function(){var desc=document.getElementById('bugDescription').value.trim();if(!desc){if(typeof toast==='function')toast('Please describe the issue','error');return;}
var btn=document.getElementById('bugSubmitBtn');if(btn){btn.disabled=true;btn.textContent='Submitting...';}
try{var r=await fetch(SUPABASE_URL+'/rest/v1/user_bug_reports',{method:'POST',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify({page_url:location.pathname,page_title:document.title,user_description:desc,console_errors:_ce,console_warnings:_cw,browser_info:{userAgent:navigator.userAgent,viewport:window.innerWidth+'x'+window.innerHeight,timestamp:new Date().toISOString()},priority:document.getElementById('bugPriority').value,status:'open'})});
if(r.ok){var d=await r.json();if(typeof toast==='function')toast('Bug report '+d[0].report_id+' submitted!','success');document.getElementById('bugDescription').value='';document.getElementById('bugReportModal').classList.remove('active');_ce.length=0;_cw.length=0;_ub();}
else{var e=await r.text();if(typeof toast==='function')toast('Failed: '+e,'error');}
}catch(ex){if(typeof toast==='function')toast('Error: '+ex.message,'error');}
finally{if(btn){btn.disabled=false;btn.textContent='Submit';}}};
})();
</script>

</body></html>
